name: Release

# 推送 vX.Y.Z tag 時觸發：三平台各自打包上傳，最後由 release job 匯總建立 GitHub Release。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # 由 tag 取得版本號（去掉開頭的 v）。
      - name: Resolve version (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Resolve version (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_ENV

      # ---- macOS：通用二進位 → 壓縮 .app ----
      - name: Build macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          wails build -platform darwin/universal -ldflags "-X main.version=${VERSION}"
          mkdir -p dist
          ditto -c -k --keepParent build/bin/TermiX.app "dist/TermiX-${VERSION}-macos.zip"

      # ---- Windows：產出可執行檔並壓成 zip（NSIS 安裝檔待 PATH 問題確認後再加）----
      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -ldflags "-X main.version=${env:VERSION}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/bin/TermiX.exe -DestinationPath "dist/TermiX-${env:VERSION}-windows-amd64.zip" -Force

      # ---- Linux：需 GTK/WebKit2GTK 4.1，並以 webkit2_41 build tag 編譯 ----
      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev
          wails build -platform linux/amd64 -tags webkit2_41 -ldflags "-X main.version=${VERSION}"
          mkdir -p dist
          tar -czf "dist/TermiX-${VERSION}-linux-amd64.tar.gz" -C build/bin TermiX

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: termix-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
