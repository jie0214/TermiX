name: Release

# 推送 vX.Y.Z tag 時觸發：GitVersion 推算版本 → 三平台打包 → 建立 GitHub Release。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 由 GitVersion 依 git 狀態推算版本（單一事實來源），供各平台共用。
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gv.outputs.majorMinorPatch }}
      semver: ${{ steps.gv.outputs.semVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - name: Determine version
        id: gv
        uses: gittools/actions/gitversion/execute@v3

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # ---- macOS：通用二進位 → 壓縮 .app ----
      - name: Build macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          wails build -platform darwin/universal -ldflags "-X main.version=${VERSION}"
          mkdir -p dist
          ditto -c -k --keepParent build/bin/TermiX.app "dist/TermiX-${VERSION}-macos.zip"

      # ---- Windows：產出可執行檔並壓成 zip ----
      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          wails build -platform windows/amd64 -ldflags "-X main.version=${env:VERSION}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/bin/TermiX.exe -DestinationPath "dist/TermiX-${env:VERSION}-windows-amd64.zip" -Force

      # ---- Linux：需 GTK/WebKit2GTK 4.1，並以 webkit2_41 build tag 編譯 ----
      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev
          wails build -platform linux/amd64 -tags webkit2_41 -ldflags "-X main.version=${VERSION}"
          mkdir -p dist
          tar -czf "dist/TermiX-${VERSION}-linux-amd64.tar.gz" -C build/bin TermiX

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: termix-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
